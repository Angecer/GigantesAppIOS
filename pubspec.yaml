name: gigantes_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  photo_view: ^0.15.0

  cupertino_icons: ^1.0.8

  sqflite: ^2.4.2
  path: ^1.9.1
  mobile_scanner: ^7.2.0
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Verdana
      fonts:
        - asset: assets/fonts/Verdana.ttf
        - asset: assets/fonts/VerdanaBold.ttf
          weight: 700

  assets:
    - assets/audios/
    - assets/imagenes/
    - assets/database/
    - assets/qr/
    - assets/fonts/